<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Customer Churn Prediction Platform built using Flask and Machine Learning."
    >

    <title>

        Customer Churn Prediction Platform

    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

    {% block styles %}

    {% endblock %}

</head>

<body>

    <!-- ====================================================== -->
    <!-- Navigation -->
    <!-- ====================================================== -->

    <header>

        <nav class="navbar">

            <div class="logo">

                Customer Churn Prediction

            </div>

            <ul class="nav-links">

                <li>

                    <a
                        href="{{ url_for('main.home') }}"
                    >
                        Home
                    </a>

                </li>

                <li>

                    <a
                        href="{{ url_for('prediction.predict') }}"
                    >
                        Single Prediction
                    </a>

                </li>

                <li>

                    <a
                        href="{{ url_for('batch_prediction.batch_predict') }}"
                    >
                        Batch Prediction
                    </a>

                </li>

                <li>

                    <a
                        href="{{ url_for('model.models') }}"
                    >
                        Models
                    </a>

                </li>

                <li>

                    <a
                        href="{{ url_for('about.about_page') }}"
                    >
                        About
                    </a>

                </li>

            </ul>

        </nav>

    </header>

    <!-- ====================================================== -->
    <!-- Main Content -->
    <!-- ====================================================== -->

    <main class="page-container">

        {% block content %}

        {% endblock %}

    </main>

    <!-- ====================================================== -->
    <!-- Footer -->
    <!-- ====================================================== -->

    <footer>

        <p>

            © 2026 Customer Churn Prediction Platform

        </p>

        <p>

            Developed using Flask, Scikit-learn and Python

        </p>

    </footer>

</body>

</html>
