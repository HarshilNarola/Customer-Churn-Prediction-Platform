{% extends "base.html" %}

{% block content %}

<section class="dashboard">

    <h1>Exploratory Data Analysis</h1>

    <div class="gallery">

        {% for image in images %}

        <div class="gallery-card">

            <img
                src="{{ url_for('static', filename='images/eda/' + image) }}"
                alt="{{ image }}"
            >

            <p>

                {{ image.replace("_"," ").replace(".png","").title() }}

            </p>

        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
